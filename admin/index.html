<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="referrer" content="no-referrer" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'none'; object-src 'none'; form-action 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://www.gstatic.com/firebasejs/12.15.0/ https://*.firebasedatabase.app; connect-src 'self' https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://*.firebasedatabase.app wss://*.firebasedatabase.app"
    />
    <meta name="theme-color" content="#0a0a0d" />
    <title>Art Jewelry Admin</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0a0d'/%3E%3Cpath d='M32 14l8 10-8 26-8-26z' fill='%23e3b873'/%3E%3Cpath d='M24 24h16l-8 10z' fill='%23f0cd92'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="admin.css?v=1" />
  </head>
  <body class="admin-body">
    <header class="site-header admin-header">
      <a class="brand" href="../" aria-label="Art Jewelry home">
        <span class="brand-mark">ART JEWELRY</span>
      </a>
      <button class="admin-badge admin-logout" id="adminLogout" type="button" hidden>Log out</button>
    </header>

    <main class="admin-shell" id="top">
      <section class="admin-login" id="loginView" aria-labelledby="admin-title">
        <div class="admin-login-copy">
          <p class="eyebrow">Admin access</p>
          <h1 id="admin-title">Admin</h1>
        </div>

        <form class="admin-form" id="adminLoginForm" autocomplete="off">
          <div class="admin-form-head">
            <span>Sign in</span>
            <span class="admin-form-lock">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
              Secure
            </span>
          </div>

          <label class="admin-field">
            <span>Password</span>
            <span class="admin-password-wrap">
              <input id="adminPassword" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
              <button type="button" class="admin-password-toggle" id="adminPasswordToggle" aria-label="Show password" aria-pressed="false">Show</button>
            </span>
          </label>

          <button class="admin-submit" id="adminSubmit" type="submit">
            <span>Log in</span>
            <svg class="admin-submit-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M4 12h15M13 5l7 7-7 7"/></svg>
          </button>

          <p class="admin-status" id="adminStatus" role="status" aria-live="polite"></p>
        </form>
      </section>

      <section class="admin-content" id="adminContent" hidden aria-live="polite"></section>
    </main>

    <script src="../firebase-config.js?v=1"></script>
    <script src="stats.js?v=1" type="module"></script>
    <script src="payload.js?v=1" defer></script>
    <script src="admin.js?v=1" defer></script>
  </body>
</html>
